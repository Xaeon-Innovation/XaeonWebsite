name: Deploy (Vercel prebuilt, prod)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: vercel-prebuilt-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Ensure prerender runs in CI (it auto-skips only on Vercel).
      ENABLE_PRERENDER: "true"
      # Used by sitemap/robots generator.
      SITE_ORIGIN: "https://xaeons.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system deps (Chromium)
        run: npx playwright install-deps chromium

      - name: Install Playwright browser (Chromium)
        run: npx playwright install chromium

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Fetch Vercel project settings
        run: vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Build (Vercel output) locally
        run: vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"

